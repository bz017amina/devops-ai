name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:

  # ================================
  # ÉTAPE 1 : Build & Push sur Docker Hub
  # ================================
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/credit-risk-api:latest

  # ================================
  # ÉTAPE 2 : Déploiement sur Kubernetes
  # ================================
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copier les fichiers YAML sur le serveur
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "k8s/"
          target: "/home/ec2-user/"

      - name: Déployer sur K3s via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            kubectl apply -f /home/ec2-user/k8s/deployment.yaml
            kubectl apply -f /home/ec2-user/k8s/service.yaml
            kubectl rollout restart deployment/credit-api-deployment
            kubectl get pods